<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Website Extractor — Wget-powered</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Inter', sans-serif;
  background: #0d1117;
  color: #c9d1d9;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}
header {
  background: linear-gradient(135deg, #667eea, #764ba2);
  padding: 60px 20px 40px;
  text-align: center;
}
header h1 { font-size: 2.5rem; font-weight: 700; color: #fff; }
header p { color: rgba(255,255,255,.85); margin-top: 12px; font-size: 1.1rem; }
header code {
  background: rgba(255,255,255,.15); padding: 2px 8px;
  border-radius: 4px; font-size: .9rem; color: #fff;
}
main { flex: 1; max-width: 720px; margin: 0 auto; padding: 40px 20px; width: 100%; }
.input-group {
  display: flex;
  gap: 10px;
  background: #161b22;
  border: 1px solid #30363d;
  border-radius: 12px;
  padding: 6px;
}
.input-group:focus-within { border-color: #764ba2; }
.input-group input {
  flex: 1;
  background: transparent;
  border: none;
  padding: 14px 16px;
  font-size: 1rem;
  color: #c9d1d9;
  outline: none;
  font-family: inherit;
}
.input-group input::placeholder { color: #484f58; }
.input-group button {
  background: linear-gradient(135deg, #667eea, #764ba2);
  border: none;
  color: #fff;
  font-weight: 600;
  padding: 14px 28px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 1rem;
  font-family: inherit;
  white-space: nowrap;
  transition: opacity .2s;
}
.input-group button:hover { opacity: .9; }
.hint { margin-top: 10px; font-size: .85rem; color: #484f58; text-align: center; }

.error-msg {
  background: #3d1418;
  border: 1px solid #f85149;
  color: #f85149;
  padding: 14px 18px;
  border-radius: 8px;
  margin-top: 20px;
  text-align: center;
  font-weight: 500;
}

.loading { display: none; margin-top: 24px; text-align: center; }
.loading.show { display: block; }
.spinner {
  display: inline-block; width: 32px; height: 32px;
  border: 3px solid #30363d; border-top-color: #764ba2;
  border-radius: 50%; animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading p { color: #8b949e; margin-top: 12px; }
.loading .cmd {
  font-family: monospace; font-size: .8rem; color: #484f58;
  margin-top: 8px; background: #0d1117; padding: 8px 12px;
  border-radius: 6px; display: inline-block; word-break: break-all;
}

footer { text-align: center; padding: 24px; color: #484f58; font-size: .85rem; }
footer a { color: #58a6ff; text-decoration: none; }

@media (max-width: 520px) {
  header h1 { font-size: 1.8rem; }
  .input-group { flex-direction: column; }
  .input-group button { width: 100%; }
}
</style>
</head>
<body>
<header>
  <h1>🌐 Website Extractor</h1>
  <p>Powered by <code>wget --mirror</code> — Download complete websites including all assets</p>
</header>
<main>
  <form action="/extract" method="GET" id="mainForm">
    <div class="input-group">
      <input type="url" name="url" id="urlInput" placeholder="https://example.com" autofocus required>
      <button type="submit">Extract 🔍</button>
    </div>
    <p class="hint">Downloads HTML, CSS, JS, images, fonts — everything</p>
  </form>

  <div class="loading" id="loading">
    <div class="spinner"></div>
    <p id="statusText">Running wget --mirror...</p>
    <div class="cmd" id="statusCmd">wget --mirror --convert-links --adjust-extension --page-requisites --no-parent &lt;url&gt;</div>
  </div>
</main>
<footer>
  Built by <a href="https://github.com/royaldevlopments">Royal Devlopments</a>
</footer>
<script>
const form = document.getElementById('mainForm');
const loading = document.getElementById('loading');
const statusText = document.getElementById('statusText');
const statusCmd = document.getElementById('statusCmd');
const urlInput = document.getElementById('urlInput');

form.addEventListener('submit', function(e) {
  const url = urlInput.value.trim();
  if (!url || !/^https?:\/\//.test(url)) {
    e.preventDefault();
    alert('Please enter a URL starting with http:// or https://');
    return;
  }
  loading.classList.add('show');
  statusCmd.textContent = 'wget --mirror --convert-links --adjust-extension --page-requisites --no-parent ' + url;
});
</script>
</body>
</html>
